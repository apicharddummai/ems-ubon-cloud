    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration ที่คุณให้มา
        const firebaseConfig = {
            apiKey: "AIzaSyCjTuJ2u8BIXrh2JYQ1rQfY6rH6OVNZF10",
            authDomain: "ems-ubon-cloud.firebaseapp.com",
            projectId: "ems-ubon-cloud",
            storageBucket: "ems-ubon-cloud.firebasestorage.app",
            messagingSenderId: "313112607978",
            appId: "1:313112607978:web:1cfad9dba9f344eb0b6b93",
            measurementId: "G-L08JF15BQW",
            databaseURL: "https://ems-ubon-cloud-default-rtdb.asia-southeast1.firebasedatabase.app" // เพิ่มเติมให้เพื่อให้เชื่อมฐานข้อมูลได้
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'ems_units');

        // --- ฟังก์ชันหลักในการดึงข้อมูลจาก Firebase ---
        onValue(dbRef, (snapshot) => {
            const val = snapshot.val();
            window.data = val ? Object.keys(val).map(key => ({ ...val[key], id: key })) : [];
            updateFilters();
            render();

$(document).ready(function() {
    $('#searchDist').select2({ placeholder: "เลือกอำเภอ", allowClear: true });
    $('#searchSub').select2({ placeholder: "เลือกตำบล", allowClear: true });
});

// และในฟังก์ชัน render() เมื่อมีการอัปเดตข้อมูลใหม่ ให้สั่ง refresh select2 ด้วยครับ
// $('#searchDist').trigger('change');
        });

        // ส่งฟังก์ชันออกไปยัง window เพื่อให้ HTML เรียกใช้ได้
        window.handleSave = function() {
            const name = document.getElementById("newName").value;
            const phone = document.getElementById("newPhone").value;
            const sub = document.getElementById("newSub").value;
            const dist = document.getElementById("newDist").value;
            const level = document.getElementById("newLevel").value;
            const mapLink = document.getElementById("newMapLink").value;
            const editId = document.getElementById("editIndex").value; // ตอนนี้เก็บ ID ของ Firebase

            if (!name || !dist) {
                Swal.fire('ข้อมูลไม่ครบ!', 'กรุณาระบุชื่อและอำเภอ', 'error');
                return;
            }

            const date = new Date().toLocaleString("th-TH", {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
            const unitData = { name, phone, sub, dist, level, mapLink, date };

            if (editId === "") {
                push(dbRef, unitData); // เพิ่มใหม่ลง Firebase
            } else {
                update(ref(db, 'ems_units/' + editId), unitData); // แก้ไขใน Firebase
            }

            toggleModal('addModal', false);
            Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', timer: 1500 });
        };

        window.deleteItem = function(id) {
            Swal.fire({
                title: 'ยืนยันการลบ?', icon: 'warning', showCancelButton: true,
                confirmButtonColor: '#dc2626', confirmButtonText: 'ลบ', cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    remove(ref(db, 'ems_units/' + id));
                }
            });
        };
    </script>

<script>
    window.data = []; // เก็บข้อมูลจาก Firebase

    function copyNumber(phone, event) {
        if (event) event.stopPropagation();
        if (!phone || phone === '-') return;
        navigator.clipboard.writeText(phone).then(() => {
            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
            Toast.fire({ icon: 'success', title: 'คัดลอกเบอร์ ' + phone + ' แล้ว' });
        });
    }

    function toggleModal(id, show) {
        document.getElementById(id).style.display = show ? "block" : "none";
    }

    function openAddModal() {
        document.getElementById("modalTitle").innerText = "เพิ่มข้อมูลหน่วยงาน";
        document.getElementById("btnSubmit").innerText = "บันทึกข้อมูล";
        document.getElementById("editIndex").value = "";
        document.querySelectorAll("#addModal input:not([type=hidden])").forEach(i => i.value = "");
        toggleModal('addModal', true);
    }

    function editItem(id) {
        const item = window.data.find(u => u.id === id);
        document.getElementById("modalTitle").innerText = "แก้ไขข้อมูลหน่วยงาน";
        document.getElementById("btnSubmit").innerText = "บันทึกการแก้ไข";
        document.getElementById("editIndex").value = id;
        document.getElementById("newName").value = item.name;
        document.getElementById("newPhone").value = item.phone;
        document.getElementById("newSub").value = item.sub;
        document.getElementById("newDist").value = item.dist;
        document.getElementById("newLevel").value = item.level;
        document.getElementById("newMapLink").value = item.mapLink || "";
        toggleModal('addModal', true);
    }

    function render() {
        const list = document.getElementById("list");
        const fName = document.getElementById("searchName").value.toLowerCase();
        const fDist = document.getElementById("searchDist").value;
        const fSub = document.getElementById("searchSub").value;
        list.innerHTML = "";
        let count = 0;

        window.data.forEach((item) => {
            if (item.name.toLowerCase().includes(fName) && (!fDist || item.dist === fDist) && (!fSub || item.sub === fSub)) {
                count++;
                list.innerHTML += `
                    <div class="card" onclick="showDetail('${item.id}')">
                        <div class="card-header">
                            <p class="unit-name">${item.name}</p>
                            <span class="badge badge-${item.level.toLowerCase()}">${item.level}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">เบอร์โทร:</span>
                            <span class="phone-num" onclick="copyNumber('${item.phone}', event)">${item.phone || '-'}</span>
                        </div>
                        <div class="info-item"><span class="label">พื้นที่:</span><span>ต.${item.sub} อ.${item.dist}</span></div>
                        <div class="card-footer">
                            <span>อัปเดต: ${item.date}</span>
                            <div class="footer-btns">
                                <button class="btn-edit" onclick="event.stopPropagation(); editItem('${item.id}')">แก้ไข</button>
                                <button class="btn-del" onclick="event.stopPropagation(); deleteItem('${item.id}')">ลบ</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        });
        document.getElementById("total").innerText = count;
        updateDatalist();
    }

    function showDetail(id) {
        const item = window.data.find(u => u.id === id);
        document.getElementById("detailContent").innerHTML = `
            <h2 style="color:var(--primary);">${item.name}</h2>
            <span class="badge badge-${item.level.toLowerCase()}">${item.level}</span>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <div id="detailArea">
                <p>📍 ต.${item.sub} อ.${item.dist}</p>
                <p>📞 เบอร์ติดต่อ: <span class="phone-num" onclick="copyNumber('${item.phone}')">${item.phone || '-'}</span></p>
                <div style="margin-top:20px; text-align:center;">
                    <a href="${item.mapLink}" target="_blank" class="btn-main" style="text-decoration:none; background:#059669;">เปิด Google Maps</a>
                </div>
            </div>
        `;
        toggleModal('detailModal', true);
    }

    function updateFilters() {
        const distSelect = document.getElementById("searchDist");
        const uniqueDistricts = [...new Set(window.data.map(item => item.dist))];
        distSelect.innerHTML = '<option value="">ทั้งหมด</option>';
        uniqueDistricts.sort().forEach(d => {
            const opt = document.createElement("option");
            opt.value = d; opt.innerText = d;
            distSelect.appendChild(opt);
        });
        updateSubdistrictDropdown();
		// เพิ่มคำสั่งนี้ไว้ในส่วนท้ายของฟังก์ชัน updateFilters() และ updateSubdistrictDropdown()
$(document).ready(function() {
    $('#searchDist').select2({ placeholder: "เลือกอำเภอ", allowClear: true });
    $('#searchSub').select2({ placeholder: "เลือกตำบล", allowClear: true });
});

// และในฟังก์ชัน render() เมื่อมีการอัปเดตข้อมูลใหม่ ให้สั่ง refresh select2 ด้วยครับ
// $('#searchDist').trigger('change');
    }

    function updateSubdistrictDropdown() {
        const distValue = document.getElementById("searchDist").value;
        const subSelect = document.getElementById("searchSub");
        const filteredSubs = window.data.filter(item => !distValue || item.dist === distValue).map(item => item.sub);
        const uniqueSubs = [...new Set(filteredSubs)];
        subSelect.innerHTML = '<option value="">ทั้งหมด</option>';
        uniqueSubs.sort().forEach(s => {
            if(s) {
                const opt = document.createElement("option");
                opt.value = s; opt.innerText = s;
                subSelect.appendChild(opt);
            }
        });
    }

    function handleNameSelect() {
        if (document.getElementById("searchName").value.trim() !== "") {
            document.getElementById("searchDist").value = "";
            document.getElementById("searchSub").value = "";
            updateSubdistrictDropdown();
        }
    }

   function updateDatalist() {
    const nameSelect = document.getElementById("searchName");
    // เก็บค่าที่เลือกไว้ก่อนหน้า (ถ้ามี)
    const currentVal = $(nameSelect).val(); 
    
    // ดึงชื่อที่ไม่ซ้ำกัน
    const uniqueNames = [...new Set(window.data.map(item => item.name))];
    
    nameSelect.innerHTML = '<option value="">ทั้งหมด</option>';
    uniqueNames.sort((a,b) => a.localeCompare(b, 'th')).forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.innerText = name;
        nameSelect.appendChild(opt);
    });

    // สั่งให้ Select2 ทำงานกับช่องชื่อหน่วย
    $('#searchName').select2({
        placeholder: "พิมพ์ค้นหาชื่อหน่วยงาน...",
        allowClear: true,
        width: '100%'
    }).val(currentVal).trigger('change.select2');
}

    function clearSearch() {
    document.getElementById("searchName").value = "";
    document.getElementById("searchDist").value = "";
    document.getElementById("searchSub").value = "";
    
    // รีเซ็ตหน้าตาของ Select2 ทั้ง 3 ช่อง
    $('#searchName').val(null).trigger('change');
    $('#searchDist').val(null).trigger('change');
    $('#searchSub').val(null).trigger('change');
    
    render();
}

    window.onclick = function(event) { if (event.target.className === 'modal') event.target.style.display = "none"; }

    // SECURITY LOCK (คงเดิม)
    document.addEventListener('contextmenu', e => e.preventDefault(), false);
    document.onkeydown = function(e) {
        if(event.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) return false;
    };
</script>
